name: publish

# Build and publish to PyPI when a GitHub release is published.
# Uses PyPI Trusted Publishing (OIDC) -- no API token to store or rotate.
# One-time PyPI setup: add a trusted (or "pending") publisher at
# https://pypi.org/manage/account/publishing/ with
#   project=ablanx  owner=fabricagen  repository=ablanx  workflow=publish.yml  environment=pypi

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Smoke test the built wheel
        run: |
          python -m pip install dist/*.whl
          python -c "from ablang_jax import Ablanx, load_ablanx_params; print('import OK')"
          python test_shapes.py
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
